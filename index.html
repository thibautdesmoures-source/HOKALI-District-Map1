// ── HELPERS ───────────────────────────────────────────────────────────────────
function norm(s) {
  return s.toLowerCase()
    .replace(/distirct/g,'district')
    .replace(/unified school district/g,'').replace(/elementary school district/g,'')
    .replace(/joint unified school district/g,'').replace(/joint unified/g,'')
    .replace(/school district/g,'').replace(/\bunified\b/g,'').replace(/\belementary\b/g,'')
    .replace(/\bjoint\b/g,'').replace(/\busd\b/g,'').replace(/\bpublic schools\b/g,'')
    .replace(/\bdistrict\b/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
}

var COORDS = {};
COORDS_RAW.forEach(function(r){ COORDS[norm(r[0])]={lat:r[1],lng:r[2],county:r[3],name:r[0]}; });

function getStatusKey(raw) {
  if (!raw) return null; var r=raw.toLowerCase().trim();
  if (r==='active') return 'Active';
  if (r.indexOf('lead in conv')>=0) return 'lead';
  if (r.indexOf('no repurchase')>=0) return 'norepur';
  if (r==='lost') return 'Lost';
  return null;
}
function getAEKey(ae){ return (!ae||ae.trim()==='')?'other':(ACTIVE_AES.indexOf(ae.trim())>=0?ae.trim():'other'); }

function parseCSV(text) {
  var rows=[],lines=text.split('\n');
  for(var i=0;i<lines.length;i++){
    var row=[],line=lines[i].replace(/\r$/,''),inQ=false,field='';
    for(var j=0;j<line.length;j++){var c=line[j];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){row.push(field);field='';}else{field+=c;}}
    row.push(field); if(row.length>1) rows.push(row);
  }
  return rows;
}

// ── GEO CACHE (localStorage) ──────────────────────────────────────────────────
function loadGeoCache(){ try{return JSON.parse(localStorage.getItem(GEO_CACHE_KEY)||'{}');}catch(e){return {};} }
function saveGeoCache(c){ try{localStorage.setItem(GEO_CACHE_KEY,JSON.stringify(c));}catch(e){} }

// ── BUILD FROM CSV ────────────────────────────────────────────────────────────
function findCoords(name) {
  var key=norm(name), c=COORDS[key];
  if (!c) {
    var words=key.split(' ');
    if(words.length>=2){var p=words.slice(0,2).join(' ');for(var k in COORDS){if(k.indexOf(p)===0){c=COORDS[k];break;}}}
  }
  return c||null;
}

function buildFromCSV(rows) {
  var known=[], unmatched=[], seen={};
  rows.slice(1).forEach(function(row){
    if(row.length<6) return;
    var name=(row[0]||'').trim(), area=(row[2]||'').trim().toLowerCase();
    var county=(row[3]||'').trim(), ae=(row[4]||'').trim(), status=(row[5]||'').trim();
    if(CA_AREAS.indexOf(area)<0) return;
    var sk=getStatusKey(status); if(!sk) return;
    if(seen[norm(name)]) return; seen[norm(name)]=true;
    var c=findCoords(name);
    if(c){
      known.push({name:c.name,lat:c.lat,lng:c.lng,county:county||c.county,ae:ae,aeKey:getAEKey(ae),statusKey:sk});
    } else {
      // Check geo cache
      var cache=loadGeoCache();
      if(cache[name]){
        var coords=cache[name];
        COORDS[norm(name)]={lat:coords.lat,lng:coords.lng,county:county,name:name};
        known.push({name:name,lat:coords.lat,lng:coords.lng,county:county,ae:ae,aeKey:getAEKey(ae),statusKey:sk});
      } else {
        unmatched.push({name:name,county:county,ae:ae,statusKey:sk});
      }
    }
  });
  return {known:known, unmatched:unmatched};
}

function buildFallback(){
  return FALLBACK_RAW.map(function(r){var sk=getStatusKey(r[5]);if(!sk)return null;return{name:r[0],lat:r[1],lng:r[2],county:r[3],ae:r[4],aeKey:getAEKey(r[4]),statusKey:sk};}).filter(Boolean);
}

// ── FILTER STATE ──────────────────────────────────────────────────────────────
var fStatus={Active:true,lead:true,norepur:true,Lost:true};
var fAE={Thibaut:true,Manuel:true,Sagui:true,Santi:true,other:true};
var searchTerm='',selectedName=null,districts=[];

function buildFilters(id,defs,stateObj,cls){
  var cont=document.getElementById(id);
  defs.forEach(function(d){var btn=document.createElement('button');btn.className='fb '+cls+'-'+d.v+' on';btn.textContent=d.label;btn.onclick=function(){stateObj[d.v]=!stateObj[d.v];btn.className='fb '+cls+'-'+d.v+(stateObj[d.v]?' on':'');rerender();};cont.appendChild(btn);});
}
buildFilters('sf',[{v:'Active',label:'● Active'},{v:'lead',label:'● Lead'},{v:'norepur',label:'● No Repurchase'},{v:'Lost',label:'● Lost'}],fStatus,'s');
buildFilters('af',[{v:'Thibaut',label:'Thibaut'},{v:'Manuel',label:'Manuel'},{v:'Sagui',label:'Sagui'},{v:'Santi',label:'Santi'},{v:'other',label:'Former/Unassigned'}],fAE,'ae');
document.getElementById('si').addEventListener('input',function(e){searchTerm=e.target.value.toLowerCase().trim();rerender();});
function isVisible(d){return fStatus[d.statusKey]&&fAE[d.aeKey]&&(!searchTerm||d.name.toLowerCase().indexOf(searchTerm)>=0);}

function renderStats(){
  var c={Active:0,lead:0,norepur:0,Lost:0};
  districts.forEach(function(d){c[d.statusKey]++;});
  document.getElementById('hstats').innerHTML=[['Active','#4ade80'],['lead','#fbbf24'],['norepur','#fb923c'],['Lost','#f87171']].map(function(s){return '<div class="stat"><div class="stat-n" style="color:'+s[1]+'">'+c[s[0]]+'</div><div class="stat-l">'+STATUS_LABELS[s[0]]+'</div></div>';}).join('');
}

// ── MAP ───────────────────────────────────────────────────────────────────────
var vectorSource=new ol.source.Vector();
var vectorLayer=new ol.layer.Vector({source:vectorSource,style:function(f){return new ol.style.Style({image:new ol.style.Circle({radius:7,fill:new ol.style.Fill({color:f.get('color')}),stroke:new ol.style.Stroke({color:'#fff',width:1.5})})});}});
var map=new ol.Map({target:'map',layers:[new ol.layer.Tile({source:new ol.source.XYZ({url:'https://{a-d}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',attributions:'© OpenStreetMap © CARTO'})}),vectorLayer],view:new ol.View({center:ol.proj.fromLonLat([-119.5,37.0]),zoom:6})});
var popup=document.getElementById('popup');
var overlay=new ol.Overlay({element:popup,positioning:'bottom-center',stopEvent:false});
map.addOverlay(overlay);
map.on('click',function(evt){var f=map.forEachFeatureAtPixel(evt.pixel,function(f){return f;});if(f){showPopup(f.get('data'));selectedName=f.get('data').name;renderList();}else{popup.style.display='none';}});
map.on('pointermove',function(evt){map.getTargetElement().style.cursor=map.hasFeatureAtPixel(evt.pixel)?'pointer':'';});

function showPopup(d){
  var sc=STATUS_COLORS[d.statusKey],aeColor=AE_COLORS[d.aeKey];
  var isFormer=d.aeKey==='other'&&d.ae&&d.ae.trim()!=='';
  var aeLabel=!d.ae||d.ae.trim()===''?'Unassigned':(isFormer?d.ae+' <span style="font-size:9px;color:#94a3b8">(former)</span>':d.ae);
  var addr=ADDRESSES[d.name]||'';
  popup.innerHTML='<div class="pop-name">'+d.name+'</div><span class="pop-badge" style="background:'+sc+'22;color:'+sc+';border:1px solid '+sc+'">'+STATUS_LABELS[d.statusKey]+'</span>'+(addr?'<div class="pop-row">&#x1F3E2; '+addr+'</div>':'')+'<div class="pop-row">&#x1F4CD; '+d.county+'</div><div class="pop-row"><span style="width:8px;height:8px;border-radius:50%;background:'+aeColor+';display:inline-block;flex-shrink:0"></span>'+aeLabel+'</div>';
  popup.style.display='block';
  overlay.setPosition(ol.proj.fromLonLat([d.lng,d.lat]));
}

function rerender(){
  vectorSource.clear(); popup.style.display='none';
  var visible=districts.filter(isVisible);
  document.getElementById('lc').textContent=visible.length+' of '+districts.length+' districts';
  visible.forEach(function(d){var f=new ol.Feature({geometry:new ol.geom.Point(ol.proj.fromLonLat([d.lng,d.lat])),color:STATUS_COLORS[d.statusKey],data:d});vectorSource.addFeature(f);});
  renderList(visible);
}
function renderList(visible){
  if(!visible) visible=districts.filter(isVisible);
  var list=document.getElementById('dl');list.innerHTML='';
  visible.forEach(function(d){
    var sc=STATUS_COLORS[d.statusKey],div=document.createElement('div');
    div.className='di'+(selectedName===d.name?' sel':'');
    div.innerHTML='<div class="dn">'+d.name+'</div><div class="dm"><div class="sdot" style="background:'+sc+'"></div><div class="dtag">'+STATUS_LABELS[d.statusKey]+' · '+(d.ae||'Unassigned')+'</div></div>';
    div.onclick=(function(dd){return function(){selectedName=dd.name;map.getView().animate({center:ol.proj.fromLonLat([dd.lng,dd.lat]),zoom:11,duration:500});showPopup(dd);renderList();};})(d);
    list.appendChild(div);
  });
}

// ── AUTO-GEOCODING ────────────────────────────────────────────────────────────
function geocodeNext(items, idx) {
  if (idx >= items.length) {
    document.getElementById('geoBar').style.display = 'none';
    return;
  }
  var item = items[idx];
  var remaining = items.length - idx;
  document.getElementById('geoBar').style.display = 'block';
  document.getElementById('geoBar').textContent = '&#128205; Locating ' + remaining + ' new district' + (remaining>1?'s':'') + '…';

  var url = 'https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(item.name + ' California') + '&format=json&limit=1&countrycodes=us';
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data && data[0]) {
        var lat=parseFloat(data[0].lat), lng=parseFloat(data[0].lon);
        // Save to cache
        var cache=loadGeoCache(); cache[item.name]={lat:lat,lng:lng}; saveGeoCache(cache);
        // Add to COORDS and districts
        COORDS[norm(item.name)]={lat:lat,lng:lng,county:item.county,name:item.name};
        if (!districts.some(function(d){return d.name===item.name;})) {
          districts.push({name:item.name,lat:lat,lng:lng,county:item.county,ae:item.ae,aeKey:getAEKey(item.ae),statusKey:item.statusKey});
          renderStats(); rerender();
        }
      }
      // Respect Nominatim rate limit: 1 req/sec
      setTimeout(function(){ geocodeNext(items, idx+1); }, 1100);
    })
    .catch(function(){
      setTimeout(function(){ geocodeNext(items, idx+1); }, 1100);
    });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
fetch(CSV_URL + '&t=' + Date.now())
  .then(function(r){ return r.text(); })
  .then(function(text){
    var rows=parseCSV(text), result=buildFromCSV(rows);
    if (result.known.length > 5) {
      districts = result.known;
      document.getElementById('liveBadge').textContent = '● Live from Sheet';
      document.getElementById('liveBadge').className = 'live-badge';
    } else {
      districts = buildFallback();
      document.getElementById('liveBadge').textContent = '⚠ Fallback data';
      document.getElementById('liveBadge').className = 'live-badge fallback';
    }
    renderStats(); rerender();
    // Kick off geocoding for unknown districts
    if (result.unmatched && result.unmatched.length > 0) {
      geocodeNext(result.unmatched, 0);
    }
  })
  .catch(function(){
    districts=buildFallback();
    document.getElementById('liveBadge').textContent='⚠ Fallback data';
    document.getElementById('liveBadge').className='live-badge fallback';
    renderStats(); rerender();
  });
</script>
